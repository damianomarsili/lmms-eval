dataset_path: dbzadnen/breast-histopathology-images
dataset_kwargs:
  token: false
task: "breast_histopathology_images"
test_split: test
output_type: generate_until
doc_to_visual: !function utils.breast_histopathology_doc_to_visual
doc_to_text: !function utils.breast_histopathology_doc_to_text
doc_to_target: !function utils.breast_histopathology_doc_to_target
process_results: !function utils.breast_histopathology_process_results

generation_kwargs:
  max_new_tokens: 16
  temperature: 0
  do_sample: false

metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true

metadata:
  - version: 0.0
