dataset_path: danjacobellis/pathmnist_224
dataset_kwargs:
  token: false
task: "pathmnist_224"
test_split: test
output_type: generate_until
doc_to_visual: !function utils.pathmnist_224_doc_to_visual
doc_to_text: !function utils.pathmnist_224_doc_to_text
doc_to_target: !function utils.pathmnist_224_doc_to_target
process_results: !function utils.pathmnist_224_process_results

generation_kwargs:
  max_new_tokens: 2048
  temperature: 0
  do_sample: false

metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true

metadata:
  - version: 0.0
